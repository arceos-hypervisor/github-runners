# AxVisor PXE Configuration - 独立DHCP模式（直连网络）
# 使用场景：服务器和开发板直连，或独立网络环境

# 关闭本地 DNS 功能
port=0

# 监听物理网卡
interface=__INTERFACE__
bind-interfaces

__DHCP_RANGE_LINE__
__DHCP_HOST_LINE__
__NO_DHCP_INTERFACE_LINE__

# UEFI客户端识别
dhcp-match=set:efi-x86_64,option:client-arch,7
dhcp-match=set:efi-x86_64,option:client-arch,9
dhcp-match=set:bios,option:client-arch,0

# PXE启动选项
# TFTP服务器地址
dhcp-option=option:tftp-server-address,__SERVER_IP__

# 识别 iPXE（二阶段 DHCP）
dhcp-userclass=set:ipxe,iPXE

# UEFI 客户端使用我们自编译的 ipxe-mb.efi
dhcp-boot=tag:!ipxe,tag:efi-x86_64,ipxe-mb.efi,,__SERVER_IP__
# Legacy BIOS 客户端使用 undionly.kpxe
__BIOS_BOOT_LINE__
# 兜底：非 iPXE 且既不是 UEFI x86_64 也不是 BIOS 时才下发 ipxe.efi
__FALLBACK_EFI_BOOT_LINE__

# iPXE：下发启动脚本（随后由脚本加载 GRUB）
dhcp-boot=tag:ipxe,boot.ipxe,,__SERVER_IP__

# iPXE启动脚本
pxe-service=x86PC, "iPXE", boot.ipxe

# TFTP 配置
enable-tftp
tftp-root=/home/root/test/x86_64-pc
tftp-no-fail

# 日志
log-dhcp
log-queries
